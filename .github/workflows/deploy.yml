name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # permite lanzar manualmente desde la UI de GitHub

concurrency:
  group: deploy-prod
  cancel-in-progress: false # no cancelar deploys en curso

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync code to VPS
        run: |
          rsync -az --delete \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env*' \
            --exclude='.playwright-mcp' \
            --exclude='*.tsbuildinfo' \
            --exclude='.DS_Store' \
            --exclude='public/uploads/*' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Trigger rebuild on VPS
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             nohup docker compose up -d --build singlufest-app > /tmp/singlufest-rebuild.log 2>&1 & \
             echo 'Rebuild dispatched'"

      - name: Wait for build to finish (rebuild log)
        run: |
          echo "Esperando que docker compose build termine (timeout 10 min)..."
          for i in {1..60}; do
            DONE=$(ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "tail -3 /tmp/singlufest-rebuild.log 2>/dev/null | grep -cE 'Started\$|Recreated.*Started|exit code|^Error|Failed'" 2>/dev/null || echo "0")
            if [ "$DONE" -gt "0" ]; then
              echo "✓ Build terminado, container reiniciado"
              break
            fi
            echo "[$i/60] build en curso, esperando 10s..."
            sleep 10
          done

      - name: Wait for healthy
        run: |
          echo "Esperando container healthy (timeout 3 min)..."
          for i in {1..18}; do
            STATUS=$(ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "docker ps --filter name=singlufest-singlufest-app --format '{{.Status}}'" 2>/dev/null || echo "ssh-error")
            if echo "$STATUS" | grep -qF "(healthy)"; then
              echo "✓ Container healthy: $STATUS"
              break
            fi
            echo "[$i/18] $STATUS — esperando 10s..."
            sleep 10
            if [ "$i" = "18" ]; then
              echo "❌ Timeout: container no llegó a healthy en 3 min"
              exit 1
            fi
          done

      - name: Smoke test
        run: |
          echo "Smoke test endpoints:"
          FAIL=0
          for path in / /api/health /cartel /admin/login; do
            CODE=$(curl -s --max-time 12 -o /dev/null -w "%{http_code}" "https://singlufest.hubstartidea.es$path")
            echo "  $CODE  $path"
            if [ "$CODE" != "200" ]; then
              echo "❌ $path no responde 200"
              FAIL=1
            fi
          done
          if [ "$FAIL" = "1" ]; then exit 1; fi
          echo "✓ Deploy OK"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
